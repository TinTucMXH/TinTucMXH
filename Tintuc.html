<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>

body{
font-family:Arial;
margin:0;
padding:15px;
background:#f0f7ff;
}

.container{
max-width:650px;
margin:auto;
}

h2{
text-align:center;
color:#0a6fd6;
}

.tabs{
display:flex;
gap:5px;
margin-bottom:10px;
}

.tabbtn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#cfd9e6;
font-weight:bold;
}

.tabbtn.active{
background:#2ecc71;
color:white;
}

.tabcontent{
display:none;
}

.tabcontent.active{
display:block;
}

.textbox-wrap{
position:relative;
}

textarea{
width:100%;
height:140px;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #cfd9e6;
resize:none;
font-size:16px;
box-sizing:border-box;
}

.iconbox{
position:absolute;
top:10px;
right:10px;
display:flex;
gap:5px;
}

.iconbtn{
width:28px;
height:28px;
border:none;
border-radius:6px;
background:#2ecc71;
color:white;
font-size:16px;
}

.dark{
background:#1a1a1a;
color:white;
border:1px solid #333;
}

.grid{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:bold;
background:#4da3ff;
color:white;
}

.bluebtn{
background:linear-gradient(135deg,#0d3b66,#5fa8ff);
}

.mail-row{
display:flex;
gap:6px;
margin-top:6px;
align-items:center;
}

.mail-row input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:13px;
}

.link{
flex:2;
}

.idbox{
flex:1;
max-width:90px;
}

.go{
width:32px;
height:32px;
background:#2ecc71;
padding:0;
}

.groupbox{
background:white;
padding:10px;
border-radius:10px;
}

.label{
color:#0a6fd6;
font-size:13px;
margin-top:10px;
font-weight:bold;
}

#notify{
margin-top:12px;
text-align:center;
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<div class="tabs">
<button class="tabbtn active" onclick="openTab('tab1',this)">Nội dung 1</button>
<button class="tabbtn" onclick="openTab('tab2',this)">Nội dung 2</button>
<button class="tabbtn" onclick="openTab('tab3',this)">Mail</button>
<button class="tabbtn" onclick="openTab('tab4',this)">Trang Page</button>
</div>

<!-- TAB PAGE -->

<div id="tab4" class="tabcontent active">

<div class="groupbox" id="pageList"></div>

</div>

<div id="notify"></div>

</div>

<script>

function openTab(id,btn){
document.querySelectorAll(".tabcontent").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabbtn").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

function copyThis(el){
navigator.clipboard.writeText(el.value);
notify("Đã copy");
}

function notify(msg){
document.getElementById("notify").innerText=msg;
setTimeout(()=>{document.getElementById("notify").innerText="";},2000);
}

// DATA PAGE
let pages = [
{ name:"Page Tin Tức", link:"https://facebook.com/page1", id:"10001"},
{ name:"Page Giải Trí", link:"https://facebook.com/page2", id:"10002"},
{ name:"Page MXH", link:"https://facebook.com/page3", id:"10003"},
{ name:"Page Viral", link:"https://facebook.com/page4", id:"10004"},
{ name:"Page Tổng Hợp", link:"https://facebook.com/page5", id:"10005"},
{ name:"Page BacGiang", link:"https://facebook.com/page6", id:"10006"},
{ name:"Page Tin Mới", link:"https://facebook.com/page7", id:"10007"},
{ name:"Page Hot", link:"https://facebook.com/page8", id:"10008"},
{ name:"Page Video", link:"https://facebook.com/page9", id:"10009"},
{ name:"Page Review", link:"https://facebook.com/page10", id:"10010"}
];

// RENDER
let html="";
pages.forEach(p=>{
html+=`
<div class="label">${p.name}</div>

<div class="mail-row">
<input class="link" value="${p.link}" readonly onclick="copyThis(this)">
<input class="idbox" value="${p.id}" readonly onclick="copyThis(this)">
<button class="go" onclick="window.open('${p.link}')">GO</button>
</div>
`;
});

document.getElementById("pageList").innerHTML=html;

</script>

</body>
</html>
