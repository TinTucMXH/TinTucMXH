<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>

body{
font-family:Arial;
margin:0;
padding:15px;
background:#f0f7ff;
}

.container{
max-width:650px;
margin:auto;
}

h2{
text-align:center;
color:#0a6fd6;
}

/* TAB */

.tabs{
display:flex;
margin-bottom:10px;
gap:5px;
}

.tabbtn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#cfd9e6;
font-weight:bold;
}

.tabbtn.active{
background:#2ecc71;
color:white;
}

.tabcontent{
display:none;
}

.tabcontent.active{
display:block;
}

.section{
margin-top:18px;
font-weight:bold;
color:#0a6fd6;
}

textarea{
width:100%;
height:140px;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #cfd9e6;
resize:none;
font-size:16px;
box-sizing:border-box;
}

.dark{
background:#1a1a1a;
color:white;
border:1px solid #333;
}

.grid{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
background:#4da3ff;
color:white;
transition:0.2s;
}

button.active{
background:#2ecc71;
}

button:active{
transform:scale(0.97);
}

.dark-btn button{
background:linear-gradient(135deg,#111,#333,#111);
}

.mail-row{
display:flex;
gap:8px;
margin-top:10px;
}

.mail-row input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.openbtn{
background:#2ecc71;
}

#notify{
margin-top:12px;
text-align:center;
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<!-- TAB BUTTON -->

<div class="tabs">

<button class="tabbtn active" onclick="openTab('tab1',this)">Nội dung 1</button>

<button class="tabbtn" onclick="openTab('tab2',this)">Nội dung 2</button>

<button class="tabbtn" onclick="openTab('tab3',this)">Mail</button>

</div>

<!-- TAB 1 -->

<div id="tab1" class="tabcontent active">

<textarea id="content1"></textarea>

<div class="grid">

<button onclick="setActive(this);copyData('content1','#tintucmxh #mxh #tintuc')">Tin tức MXH</button>

<button onclick="setActive(this);copyData('content1','#tinmoimxh #mxh #tintuc')">Tin Mới</button>

<button onclick="setActive(this);copyData('content1','#todaynews #mxh #tintuc')">Today News</button>

<button onclick="setActive(this);copyData('content1','#cxcn #camxucconnguoi #mxh #tintuc')">Cảm xúc</button>

<button onclick="setActive(this);copyData('content1','#tintuc #mxh')">Chi tiết</button>

<button onclick="setActive(this);tinNong()">Tin Nóng</button>

</div>

</div>

<!-- TAB 2 -->

<div id="tab2" class="tabcontent">

<textarea id="content2" class="dark"></textarea>

<div class="grid dark-btn">

<button onclick="setActive(this);copyProduct('🚀 Mũ Fullface thể thao Royal M266 – đẹp, chắc, giá cực tốt hôm nay! #royalm266 #fullfacehelmet #muabaohiem #dealhot #tiktokshop #xuhuongtiktok #fyp')">
Royal M266
</button>

<button onclick="setActive(this);copyProduct('Royal M179 là dòng mũ bảo hiểm fullface lật hàm hiện đại, kết hợp giữa sự an toàn của mũ fullface và sự tiện lợi của mũ 3/4. Thiết kế lật cằm thông minh giúp người dùng dễ dàng giao tiếp mà không cần tháo mũ. #royalm179 #royalhelmet #muabaohiem #muabaohiemfullface #muabaohiemlatham')">
Royal M179
</button>

<button onclick="setActive(this);copyData('content2','#review #sanpham')">Review</button>
<button onclick="setActive(this);copyData('content2','#giamgia #uudai')">Giảm Giá</button>
<button onclick="setActive(this);copyData('content2','#tiktokshop #sanphamhot')">TikTok Shop</button>
<button onclick="setActive(this);copyData('content2','#muasam #dealhot')">Mua Sắm</button>

</div>

</div>

<!-- TAB 3 MAIL -->

<div id="tab3" class="tabcontent">

<div class="mail-row">
<input type="text" id="link1" placeholder="Link web 1">
<button class="openbtn" onclick="openLink('link1')">Mở</button>
</div>

<div class="mail-row">
<input type="text" id="link2" placeholder="Link web 2">
<button class="openbtn" onclick="openLink('link2')">Mở</button>
</div>

<div class="mail-row">
<input type="text" id="link3" placeholder="Link web 3">
<button class="openbtn" onclick="openLink('link3')">Mở</button>
</div>

<div class="mail-row">
<input type="text" id="link4" placeholder="Link web 4">
<button class="openbtn" onclick="openLink('link4')">Mở</button>
</div>

</div>

<div id="notify"></div>

</div>


<script>

function openTab(id,btn){

document.querySelectorAll(".tabcontent").forEach(t=>{
t.classList.remove("active");
});

document.querySelectorAll(".tabbtn").forEach(t=>{
t.classList.remove("active");
});

document.getElementById(id).classList.add("active");
btn.classList.add("active");

}

function openLink(id){

let url=document.getElementById(id).value;

if(url.trim()){
window.open(url,"_blank");
}

}

function setActive(btn){

document.querySelectorAll(".grid button").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

}

function today(){

const d=new Date();

return "Ngày đăng : "
+String(d.getDate()).padStart(2,'0')+"/"
+String(d.getMonth()+1).padStart(2,'0')+"/"
+d.getFullYear();

}

function replaceWords(text){

text=text.replace(/tử vong/gi,"TV");
text=text.replace(/dao/gi,"🔪");

return text;

}

function rewriteNews(text){

text=replaceWords(text);

return "🚨 TIN NÓNG MXH\n\n"
+text+
"\n\nThông tin đang thu hút sự chú ý trên mạng xã hội.";

}

function tinNong(){

let text=document.getElementById("content1").value;

if(!text.trim()){
notify("⚠️ Chưa có nội dung");
return;
}

let result=rewriteNews(text)
+"\n\n"+today()
+"\n#tinnong #mxh #news";

navigator.clipboard.writeText(result);

notify("🔥 Đã tạo Tin Nóng và copy!");

}

function copyData(id,tag){

let text=document.getElementById(id).value;

let result=text
+"\n\n"+today()
+"\n"+tag;

navigator.clipboard.writeText(result);

notify("✅ Đã copy nội dung!");

}

function copyProduct(text){

let result=today()+"\n"+text;

navigator.clipboard.writeText(result);

notify("✅ Đã copy nội dung sản phẩm!");

}

function notify(msg){

document.getElementById("notify").innerText=msg;

setTimeout(()=>{
document.getElementById("notify").innerText="";
},2000);

}

</script>

</body>
</html>
