<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>

body{
font-family:Arial;
margin:0;
padding:15px;
background:#f0f7ff;
}

.container{
max-width:650px;
margin:auto;
}

h2{
text-align:center;
color:#0a6fd6;
}

.tabs{
display:flex;
gap:5px;
margin-bottom:10px;
}

.tabbtn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#cfd9e6;
font-weight:bold;
}

.tabbtn.active{
background:#2ecc71;
color:white;
}

.tabcontent{
display:none;
}

.tabcontent.active{
display:block;
}

textarea{
width:100%;
height:140px;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #cfd9e6;
resize:none;
font-size:16px;
box-sizing:border-box;
}

.dark{
background:#1a1a1a;
color:white;
border:1px solid #333;
}

.grid{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
background:#4da3ff;
color:white;
}

/* nút xanh than */
.bluebtn{
background:linear-gradient(135deg,#0d3b66,#5fa8ff);
}

.mail-row{
display:flex;
gap:8px;
margin-top:10px;
}

.mail-row input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.openbtn{
background:#2ecc71;
}

.salary-box{
margin-top:15px;
padding:12px;
background:#ffffff;
border-radius:10px;
}

.salary-box input,
.salary-box select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:6px;
}

.salary-box textarea{
height:120px;
}

.history{
height:120px;
}

#notify{
margin-top:12px;
text-align:center;
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<div class="tabs">
<button class="tabbtn active" onclick="openTab('tab1',this)">Nội dung 1</button>
<button class="tabbtn" onclick="openTab('tab2',this)">Nội dung 2</button>
<button class="tabbtn" onclick="openTab('tab3',this)">Mail</button>
</div>


<!-- TAB 1 -->

<div id="tab1" class="tabcontent active">

<textarea id="content1"></textarea>

<div class="grid">

<button onclick="copyData('content1','#tintucmxh #mxh #tintuc')">Tin tức MXH</button>
<button onclick="copyData('content1','#tinmoimxh #mxh #tintuc')">Tin Mới</button>
<button onclick="copyData('content1','#todaynews #mxh #tintuc')">Today News</button>
<button onclick="copyData('content1','#cxcn #camxucconnguoi #mxh #tintuc')">Cảm xúc</button>
<button onclick="copyData('content1','#tintuc #mxh')">Chi tiết</button>
<button onclick="tinNong()">Tin Nóng</button>

<!-- BUTTON MỚI -->
<button class="bluebtn" onclick="copyData('content1','#tinmoi24h #tintuc #mxh')">
TinMoi24h
</button>

<button class="bluebtn" onclick="copyData('content1','#bacgiang #tintuc #mxh')">
BacGiang
</button>

</div>

</div>


<!-- TAB 2 -->

<div id="tab2" class="tabcontent">

<textarea id="content2" class="dark"></textarea>

<div class="grid">

<button onclick="copyProduct('🚀 Mũ Fullface Royal M266 giá tốt hôm nay #royalm266 #muabaohiem')">
Royal M266
</button>

<button onclick="copyProduct('Mũ lật hàm Royal M179 tiện lợi an toàn #royalm179 #muabaohiem')">
Royal M179
</button>

<button onclick="copyData('content2','#review #sanpham')">Review</button>
<button onclick="copyData('content2','#giamgia #uudai')">Giảm Giá</button>
<button onclick="copyData('content2','#tiktokshop #sanphamhot')">TikTok Shop</button>
<button onclick="copyData('content2','#muasam #dealhot')">Mua Sắm</button>

</div>

</div>


<!-- TAB MAIL -->

<div id="tab3" class="tabcontent">

<div class="mail-row">
<input type="text" value="https://mail.tm/" readonly>
<button class="openbtn" onclick="window.open('https://mail.tm/')">Mở</button>
</div>

<div class="mail-row">
<input type="text" value="https://yahoo.com.vn" readonly>
<button class="openbtn" onclick="window.open('https://yahoo.com.vn')">Mở</button>
</div>

<div class="mail-row">
<input type="text" value="https://gmail.com" readonly>
<button class="openbtn" onclick="window.open('https://gmail.com')">Mở</button>
</div>


<div class="salary-box">

<h3>Tính Thu Nhập</h3>

<label>Thu nhập $</label>
<input type="number" id="income">

<label>Tỷ giá VNĐ</label>
<input type="number" id="rate" value="25000">

<label>Phần trăm nhận</label>

<select id="percent">
<option>50</option>
<option>55</option>
<option>60</option>
<option>65</option>
<option>70</option>
<option>75</option>
<option>80</option>
<option>85</option>
<option>90</option>
<option>95</option>
<option selected>100</option>
</select>

<button onclick="tinhTien()">Tính Tiền</button>
<button onclick="copyLuong()">Copy bảng lương</button>
<button onclick="clearHistory()">Xóa lịch sử</button>

<textarea id="salaryResult" readonly placeholder="Bảng lương"></textarea>

<textarea id="history" class="history" readonly placeholder="Lịch sử bảng lương"></textarea>

</div>

</div>

<div id="notify"></div>

</div>


<script>

function openTab(id,btn){

document.querySelectorAll(".tabcontent").forEach(t=>{
t.classList.remove("active");
});

document.querySelectorAll(".tabbtn").forEach(t=>{
t.classList.remove("active");
});

document.getElementById(id).classList.add("active");
btn.classList.add("active");

}

function today(){

const d=new Date();

return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();

}

function copyData(id,tag){

let text=document.getElementById(id).value;

let result=text+"\n\nNgày đăng: "+today()+"\n"+tag;

navigator.clipboard.writeText(result);

notify("Đã copy");

}

function tinNong(){

let text=document.getElementById("content1").value;

let result="🚨 TIN NÓNG\n\n"+text+"\n\n#tinnong #mxh";

navigator.clipboard.writeText(result);

notify("Đã copy Tin Nóng");

}

function copyProduct(text){

navigator.clipboard.writeText(text);

notify("Đã copy sản phẩm");

}

function tinhTien(){

let income=parseFloat(document.getElementById("income").value)||0;

let rate=parseFloat(document.getElementById("rate").value)||0;

let percent=parseFloat(document.getElementById("percent").value)||0;

let receiveUsd=income*percent/100;

let vnd=receiveUsd*rate;

let result=
"===== BẢNG LƯƠNG =====\n"+
"Ngày: "+today()+"\n\n"+
"Thu nhập gốc: $"+income+"\n"+
"Phần trăm nhận: "+percent+"%\n"+
"Thực nhận: $"+receiveUsd.toFixed(2)+"\n"+
"Tỷ giá: "+rate.toLocaleString()+" VNĐ\n"+
"Quy đổi: "+vnd.toLocaleString()+" VNĐ\n";

document.getElementById("salaryResult").value=result;

document.getElementById("history").value=
result+"\n----------------\n"+
document.getElementById("history").value;

}

function copyLuong(){

navigator.clipboard.writeText(document.getElementById("salaryResult").value);

notify("Đã copy bảng lương");

}

function clearHistory(){

document.getElementById("history").value="";

}

function notify(msg){

document.getElementById("notify").innerText=msg;

setTimeout(()=>{
document.getElementById("notify").innerText="";
},2000);

}

</script>

</body>
</html>
