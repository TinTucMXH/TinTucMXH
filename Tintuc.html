<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Copy Nội Dung</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:15px;
    background:#f0f7ff;
}

/* khung chính */
.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
    color:#0a6fd6;
}

/* TEXTBOX CHUNG */
textarea{
    width:100%;
    height:140px;
    font-size:16px;
    padding:12px;
    border-radius:10px;
    border:1px solid #cfd9e6;
    resize:none;
    box-sizing:border-box;
    margin-top:10px;
}

/* TEXTBOX 2 màu đen */
.textbox2{
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
}

/* GRID BUTTON */
.button-grid{
    margin-top:15px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* BUTTON PHẦN 1 */
button{
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#4da3ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#2f8cff;
}

/* BUTTON PHẦN 2 (đen gradient) */
.button-dark button{
    background:linear-gradient(135deg,#111,#333,#111);
    color:white;
}

.button-dark button:hover{
    background:linear-gradient(135deg,#000,#444,#000);
}

/* thông báo */
#notify{
    margin-top:10px;
    text-align:center;
    color:green;
    font-weight:bold;
}

.section-title{
    margin-top:20px;
    font-weight:bold;
    color:#0a6fd6;
}

</style>

</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<!-- TEXTBOX 1 -->
<div class="section-title">Nội dung 1</div>
<textarea id="content1"></textarea>

<div class="button-grid">

<button onclick="copyText1('#tintucmxh #mxh #tintuc')">Tin tức MXH</button>
<button onclick="copyText1('#tinmoimxh #mxh #tintuc')">Tin Mới</button>
<button onclick="copyText1('#todaynews #mxh #tintuc')">Today News</button>
<button onclick="copyText1('#cxcn #camxucconnguoi #mxh #tintuc')">Cảm xúc</button>
<button onclick="copyText1('#hashtag5')">Hashtag 5</button>
<button onclick="copyText1('#tinnong #mxh #news')">Tin Nóng</button>

</div>


<!-- TEXTBOX 2 -->
<div class="section-title">Nội dung 2</div>
<textarea id="content2" class="textbox2"></textarea>

<div class="button-grid button-dark">

<button onclick="copyText2('#sale #khuyenmai')">Sale</button>
<button onclick="copyText2('#hanghot #deal')">Hàng Hot</button>
<button onclick="copyText2('#review #sanpham')">Review</button>
<button onclick="copyText2('#giamgia #uudai')">Giảm Giá</button>
<button onclick="copyText2('#tiktokshop #sanphamhot')">TikTok Shop</button>
<button onclick="copyText2('#muasam #dealhot')">Mua Sắm</button>

</div>

<div id="notify"></div>

</div>

<script>

function getToday(){
    const today = new Date();
    const day = String(today.getDate()).padStart(2,'0');
    const month = String(today.getMonth()+1).padStart(2,'0');
    const year = today.getFullYear();
    return `Ngày đăng : ${day}/${month}/${year}`;
}

function copyText1(hashtag){

    let text = document.getElementById("content1").value;
    let result = text + "\n\n" + getToday() + "\n" + hashtag;

    navigator.clipboard.writeText(result);

    document.getElementById("notify").innerText = "✅ Đã copy nội dung 1!";
}

function copyText2(hashtag){

    let text = document.getElementById("content2").value;
    let result = text + "\n\n" + getToday() + "\n" + hashtag;

    navigator.clipboard.writeText(result);

    document.getElementById("notify").innerText = "✅ Đã copy nội dung 2!";
}

</script>

</body>
</html>
