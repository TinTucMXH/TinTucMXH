<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool Copy Nội Dung</title>

<style>
body{
    font-family: Arial;
    padding:40px;
}

textarea{
    width:100%;
    height:120px;
    font-size:16px;
    padding:10px;
}

button{
    padding:10px 20px;
    margin:10px 5px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>Nhập nội dung</h2>

<textarea id="content" placeholder="Nhập nội dung tại đây..."></textarea>

<br><br>

<button onclick="copyText('#hashtag1')">Copy 1</button>
<button onclick="copyText('#hashtag2')">Copy 2</button>
<button onclick="copyText('#hashtag3')">Copy 3</button>
<button onclick="copyText('#hashtag4')">Copy 4</button>
<button onclick="copyText('#hashtag5')">Copy 5</button>

<script>

function getToday(){
    const today = new Date();
    const day = String(today.getDate()).padStart(2,'0');
    const month = String(today.getMonth()+1).padStart(2,'0');
    const year = today.getFullYear();
    return `Ngày đăng : ${day}/${month}/${year}`;
}

function copyText(hashtag){

    let text = document.getElementById("content").value;

    let result = text + "\n\n" + getToday() + "\n" + hashtag;

    navigator.clipboard.writeText(result);

    alert("Đã copy nội dung!");
}

</script>

</body>
</html>
