<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Tập Viết Số</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>

body{
font-family:Arial;
background:#e3f2fd;
text-align:center;
padding:10px;
}

canvas{
background:white;
border:3px solid #1976d2;
border-radius:10px;
touch-action:none;
}

button{
padding:10px 18px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
}

.clear{
background:#f44336;
color:white;
}

.recognize{
background:#4caf50;
color:white;
}

#result{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<h2>✏️ Bé Viết Số</h2>

<canvas id="canvas" width="300" height="300"></canvas>

<br>

<button class="clear" onclick="clearCanvas()">Xóa</button>
<button class="recognize" onclick="predict()">Nhận diện</button>

<div id="result">?</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 20;
ctx.lineCap = "round";

let drawing=false;

function start(e){
drawing=true;
draw(e);
}

function end(){
drawing=false;
ctx.beginPath();
}

function draw(e){

if(!drawing) return;

let rect = canvas.getBoundingClientRect();

let x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
let y = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);

}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",end);
canvas.addEventListener("touchmove",draw);

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
document.getElementById("result").innerText="?";
}

let model;

async function loadModel(){

model = await tf.loadLayersModel(
"https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
);

}

loadModel();

function preprocess(){

let img = tf.browser.fromPixels(canvas,1);

img = tf.image.resizeBilinear(img,[28,28]);

img = img.mean(2);

img = img.expandDims(0);

img = img.expandDims(-1);

img = img.div(255.0);

return img;

}

async function predict(){

let img = preprocess();

let prediction = model.predict(img);

let data = await prediction.data();

let max = data.indexOf(Math.max(...data));

document.getElementById("result").innerText=max;

}

</script>

</body>
</html>
