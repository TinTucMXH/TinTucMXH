<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bé Tập Viết</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>

body{
font-family:Arial;
background:#e3f2fd;
text-align:center;
padding:10px;
}

h2{
color:#1565c0;
}

canvas{
background:white;
border:3px solid #1976d2;
border-radius:10px;
touch-action:none;
}

button{
padding:10px 16px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
}

.clear{
background:#f44336;
color:white;
}

.recognize{
background:#4caf50;
color:white;
}

#result{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<h2>✏️ Bé Tập Viết Chữ</h2>

<p>Viết chữ hoặc số vào ô</p>

<canvas id="writeCanvas" width="300" height="300"></canvas>

<br>

<button class="clear" onclick="clearCanvas()">Xóa</button>
<button class="recognize" onclick="predict()">Nhận diện</button>

<div id="result">?</div>

<canvas id="notebook" width="300" height="300"></canvas>

<script>

const canvas = document.getElementById("writeCanvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 18;
ctx.lineCap = "round";

let drawing=false;

function start(e){
drawing=true;
draw(e);
}

function end(){
drawing=false;
ctx.beginPath();
}

function draw(e){

if(!drawing) return;

let rect = canvas.getBoundingClientRect();

let x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
let y = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;

ctx.lineTo(x,y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y);

}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",end);
canvas.addEventListener("touchmove",draw);

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

document.getElementById("result").innerText="?";

let ctx2=document.getElementById("notebook").getContext("2d");
ctx2.clearRect(0,0,300,300);

drawNotebook();

}

let model;

async function loadModel(){

model = await tf.loadLayersModel(
"https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
);

}

loadModel();

function preprocess(){

let img = tf.browser.fromPixels(canvas,1);

img = tf.image.resizeBilinear(img,[28,28]);

img = img.mean(2);

img = img.expandDims(0);

img = img.expandDims(-1);

img = img.div(255.0);

return img;

}

async function predict(){

let img = preprocess();

let prediction = model.predict(img);

let data = await prediction.data();

let max = data.indexOf(Math.max(...data));

document.getElementById("result").innerText=max;

drawLetter(max);

}

function drawNotebook(){

let canvas2=document.getElementById("notebook");
let ctx2=canvas2.getContext("2d");

let size=100;

for(let x=0;x<canvas2.width;x+=size){

for(let y=0;y<canvas2.height;y+=size){

ctx2.strokeStyle="#2196f3";
ctx2.lineWidth=2;

ctx2.strokeRect(x,y,size,size);

ctx2.strokeStyle="#90caf9";
ctx2.lineWidth=1;

ctx2.beginPath();
ctx2.moveTo(x+size/2,y);
ctx2.lineTo(x+size/2,y+size);
ctx2.stroke();

ctx2.beginPath();
ctx2.moveTo(x,y+size/2);
ctx2.lineTo(x+size,y+size/2);
ctx2.stroke();

}

}

}

function drawLetter(letter){

let canvas2=document.getElementById("notebook");
let ctx2=canvas2.getContext("2d");

drawNotebook();

ctx2.font="120px Arial";

ctx2.textAlign="center";
ctx2.textBaseline="middle";

ctx2.fillStyle="black";

ctx2.fillText(letter,150,150);

}

drawNotebook();

</script>

</body>
</html>
