<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>

body{
font-family:Arial;
margin:0;
padding:15px;
background:#f0f7ff;
}

.container{
max-width:650px;
margin:auto;
}

h2{
text-align:center;
color:#0a6fd6;
}

.tabs{
display:flex;
gap:5px;
margin-bottom:10px;
}

.tabbtn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#cfd9e6;
font-weight:bold;
}

.tabbtn.active{
background:#2ecc71;
color:white;
}

.tabcontent{
display:none;
}

.tabcontent.active{
display:block;
}

textarea{
width:100%;
height:140px;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #cfd9e6;
resize:none;
font-size:16px;
box-sizing:border-box;
}

.dark{
background:#1a1a1a;
color:white;
border:1px solid #333;
}

.grid{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
background:#4da3ff;
color:white;
}

.filebox{
margin-top:10px;
display:flex;
gap:8px;
}

.filebox button{
flex:1;
}

#notify{
margin-top:12px;
text-align:center;
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<div class="tabs">
<button class="tabbtn active" onclick="openTab('tab1',this)">Nội dung 1</button>
<button class="tabbtn" onclick="openTab('tab2',this)">Nội dung 2</button>
</div>

<!-- TAB 1 -->

<div id="tab1" class="tabcontent active">

<textarea id="content1" placeholder="Nhập nội dung..."></textarea>

<div class="grid">

<button onclick="copyData('content1','#tintucmxh #mxh #tintuc')">Tin tức MXH</button>
<button onclick="copyData('content1','#tinmoimxh #mxh #tintuc')">Tin Mới</button>
<button onclick="copyData('content1','#todaynews #mxh #tintuc')">Today News</button>
<button onclick="copyData('content1','#cxcn #camxucconnguoi #mxh #tintuc')">Cảm xúc</button>
<button onclick="copyData('content1','#tintuc #mxh')">Chi tiết</button>
<button onclick="tinNong()">Tin Nóng</button>

</div>

</div>

<!-- TAB 2 -->

<div id="tab2" class="tabcontent">

<textarea id="content2" class="dark" placeholder="Nội dung sản phẩm..."></textarea>

<div class="grid">

<button onclick="copyProduct('🚀 Mũ Fullface Royal M266 giá tốt hôm nay #royalm266 #muabaohiem')">
Royal M266
</button>

<button onclick="copyProduct('Mũ lật hàm Royal M179 tiện lợi an toàn #royalm179 #muabaohiem')">
Royal M179
</button>

<button onclick="copyData('content2','#review #sanpham')">Review</button>
<button onclick="copyData('content2','#giamgia #uudai')">Giảm Giá</button>
<button onclick="copyData('content2','#tiktokshop #sanphamhot')">TikTok Shop</button>
<button onclick="copyData('content2','#muasam #dealhot')">Mua Sắm</button>

</div>

</div>

<div class="filebox">

<button onclick="exportTXT()">Xuất TXT</button>

<button onclick="document.getElementById('fileInput').click()">Nhập TXT</button>

<input type="file" id="fileInput" accept=".txt" style="display:none">

</div>

<div id="notify"></div>

</div>

<script>

function openTab(id,btn){

document.querySelectorAll(".tabcontent").forEach(t=>{
t.classList.remove("active");
});

document.querySelectorAll(".tabbtn").forEach(t=>{
t.classList.remove("active");
});

document.getElementById(id).classList.add("active");
btn.classList.add("active");

}

function today(){

const d=new Date();
return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();

}

function copyData(id,tag){

let text=document.getElementById(id).value;

let result=text+"\n\nNgày đăng: "+today()+"\n"+tag;

navigator.clipboard.writeText(result);

saveData();

notify("Đã copy");

}

function tinNong(){

let text=document.getElementById("content1").value;

let result="🚨 TIN NÓNG\n\n"+text+"\n\n#tinnong #mxh";

navigator.clipboard.writeText(result);

saveData();

notify("Đã copy Tin Nóng");

}

function copyProduct(text){

navigator.clipboard.writeText(text);

saveData();

notify("Đã copy sản phẩm");

}

/* SAVE DATA /

function saveData(){

localStorage.setItem("tool_content1",document.getElementById("content1").value);

localStorage.setItem("tool_content2",document.getElementById("content2").value);

}

/ LOAD DATA /

function loadData(){

let c1=localStorage.getItem("tool_content1");
let c2=localStorage.getItem("tool_content2");

if(c1) document.getElementById("content1").value=c1;

if(c2) document.getElementById("content2").value=c2;

}

/ AUTO SAVE /

document.getElementById("content1").addEventListener("input",saveData);
document.getElementById("content2").addEventListener("input",saveData);

/ EXPORT TXT /

function exportTXT(){

let data=
"=== NỘI DUNG 1 ===\n"+
document.getElementById("content1").value+

"\n\n=== NỘI DUNG 2 ===\n"+
document.getElementById("content2").value;

let blob=new Blob([data],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="noidung_tool.txt";

a.click();

notify("Đã xuất file");

}

/ IMPORT TXT */

document.getElementById("fileInput").addEventListener("change",function(e){

let file=e.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(event){

let text=event.target.result;

let part=text.split("=== NỘI DUNG 2 ===");

let c1=part[0].replace("=== NỘI DUNG 1 ===","").trim();

let c2=part[1] ? part[1].trim() : "";

document.getElementById("content1").value=c1;

document.getElementById("content2").value=c2;

saveData();

notify("Đã load file");

};

reader.readAsText(file);

});

function notify(msg){

document.getElementById("notify").innerText=msg;

setTimeout(()=>{
document.getElementById("notify").innerText="";
},2000);

}

window.onload=loadData;

</script>

</body>
</html>
