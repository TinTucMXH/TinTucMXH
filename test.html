<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>

body{
font-family:Arial;
margin:0;
padding:15px;
background:#f0f7ff;
}

.container{
max-width:650px;
margin:auto;
}

h2{
text-align:center;
color:#0a6fd6;
}

.tabs{
display:flex;
gap:5px;
margin-bottom:10px;
}

.tabbtn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#cfd9e6;
font-weight:bold;
}

.tabbtn.active{
background:#2ecc71;
color:white;
}

.tabcontent{
display:none;
}

.tabcontent.active{
display:block;
}

.mail-row{
display:flex;
gap:6px;
margin-top:6px;
align-items:center;
}

.mail-row input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:13px;
}

.link{
flex:2;
}

.idbox{
flex:1;
max-width:100px;
}

.go{
width:32px;
height:32px;
background:#2ecc71;
border:none;
color:white;
border-radius:6px;
}

.groupbox{
background:white;
padding:10px;
border-radius:10px;
}

.label{
color:#0a6fd6;
font-size:13px;
margin-top:10px;
font-weight:bold;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
font-weight:bold;
}

#notify{
margin-top:12px;
text-align:center;
color:green;
font-weight:bold;
}

.getuid{
background:#ff9800;
}

</style>
</head>

<body>

<div class="container">

<h2>Tool Copy Nội Dung</h2>

<div class="tabs">
<button class="tabbtn active" onclick="openTab('tab4',this)">Trang Page</button>
</div>

<div id="tab4" class="tabcontent active">

<div class="groupbox">

<!-- TOOL LẤY UID -->
<div class="label">🔎 Nhập link Facebook để lấy UID</div>

<div class="mail-row">
<input id="fbLink" class="link" placeholder="Dán link Facebook vào đây...">
<button class="getuid" onclick="getUID()">Lấy UID</button>
<input id="fbUID" class="idbox" placeholder="UID" readonly onclick="copyThis(this)">
</div>

<hr>

<div id="pageList"></div>

</div>

</div>

<div id="notify"></div>

</div>

<script>

function openTab(id,btn){
document.querySelectorAll(".tabcontent").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabbtn").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

function copyThis(el){
navigator.clipboard.writeText(el.value);
notify("Đã copy");
}

function notify(msg){
document.getElementById("notify").innerText=msg;
setTimeout(()=>{document.getElementById("notify").innerText="";},2000);
}

// ===== LẤY UID =====
async function getUID(){
let link=document.getElementById("fbLink").value.trim();

if(!link){
notify("Nhập link trước");
return;
}

// Trường hợp có sẵn ID
let match=link.match(/id=(\d+)/);
if(match){
document.getElementById("fbUID").value=match[1];
notify("Đã lấy UID");
return;
}

// Username → gọi API
try{
let clean=link.replace("https://","").replace("http://","").replace("www.","");
clean=clean.split("/")[1];

let res=await fetch("https://api.findids.net/api/get-uid-from-username?username="+clean);
let data=await res.json();

if(data.status==200){
document.getElementById("fbUID").value=data.data.id;
notify("Đã lấy UID");
}else{
notify("Không lấy được UID");
}
}catch{
notify("Lỗi lấy UID");
}
}

// ===== DATA PAGE =====
let pages = [
{ name:"Page Tin Tức", link:"https://facebook.com/page1", id:"10001"},
{ name:"Page Giải Trí", link:"https://facebook.com/page2", id:"10002"},
{ name:"Page MXH", link:"https://facebook.com/page3", id:"10003"},
{ name:"Page Viral", link:"https://facebook.com/page4", id:"10004"}
];

let html="";
pages.forEach(p=>{
html+=`
<div class="label">${p.name}</div>

<div class="mail-row">
<input class="link" value="${p.link}" readonly onclick="copyThis(this)">
<input class="idbox" value="${p.id}" readonly onclick="copyThis(this)">
<button class="go" onclick="window.open('${p.link}')">GO</button>
</div>
`;
});

document.getElementById("pageList").innerHTML=html;

</script>

</body>
</html>
