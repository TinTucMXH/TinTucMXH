<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Tool Copy Nội Dung</title>

<style>
body{font-family:Arial;margin:0;padding:15px;background:#f0f7ff;}
.container{max-width:650px;margin:auto;}
h2{text-align:center;color:#0a6fd6;}

.tabs{display:flex;gap:5px;margin-bottom:10px;}
.tabbtn{flex:1;padding:12px;border:none;border-radius:8px;background:#cfd9e6;font-weight:bold;}
.tabbtn.active{background:#2ecc71;color:white;}

.tabcontent{display:none;}
.tabcontent.active{display:block;}

.textbox-wrap{position:relative;}
textarea{
width:100%;height:140px;padding:12px;margin-top:8px;
border-radius:10px;border:1px solid #cfd9e6;
resize:none;font-size:16px;box-sizing:border-box;
}

.iconbox{position:absolute;top:10px;right:10px;display:flex;gap:5px;}
.iconbtn{
width:28px;height:28px;border:none;border-radius:6px;
background:#2ecc71;color:white;font-size:16px;
}

.dark{background:#1a1a1a;color:white;border:1px solid #333;}

.grid{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{
padding:14px;border:none;border-radius:10px;
font-size:14px;font-weight:bold;background:#4da3ff;color:white;
}

.bluebtn{background:linear-gradient(135deg,#0d3b66,#5fa8ff);}

.mail-row{margin-top:8px;padding:6px;background:#fff;border-radius:8px;}
.mail-row input{
width:100%;padding:8px;margin-top:4px;
border-radius:6px;border:1px solid #ccc;font-size:13px;
}

.go{width:100%;margin-top:5px;background:#2ecc71;}

.groupbox{background:white;padding:10px;border-radius:10px;}

.salary-box{
margin-top:15px;padding:12px;background:#ffffff;border-radius:10px;
}

.salary-box input,
.salary-box select{
width:100%;padding:10px;border-radius:8px;
border:1px solid #ccc;margin-top:6px;
}

.salary-box textarea{height:120px;}
.history{height:120px;}

#notify{margin-top:12px;text-align:center;color:green;font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<h2>Tool Copy Nội Dung</h2>

<div class="tabs">
<button class="tabbtn active" onclick="openTab('tab1',this)">Nội dung 1</button>
<button class="tabbtn" onclick="openTab('tab2',this)">Nội dung 2</button>
<button class="tabbtn" onclick="openTab('tab3',this)">Mail</button>
<button class="tabbtn" onclick="openTab('tab4',this)">Trang Page</button>
</div>

<!-- TAB 1 -->
<div id="tab1" class="tabcontent active">

<div style="margin-bottom:8px;">
<label><input type="radio" name="mode" value="single" checked> 1 chuỗi</label>
<label style="margin-left:15px;"><input type="radio" name="mode" value="split"> Tách chuỗi</label>
</div>

<div class="textbox-wrap">
<textarea id="content1" placeholder="Dán 10 dòng:
1. Nội dung 1
2. Nội dung 2
...
10. Nội dung 10"></textarea>

<div class="iconbox">
<button class="iconbtn" onclick="pasteText()">📋</button>
<button class="iconbtn" onclick="clearText()">❌</button>
</div>
</div>

<div class="grid">
<button onclick="copySmart(1)">1. Button 1</button>
<button onclick="copySmart(2)">2. Button 2</button>
<button onclick="copySmart(3)">3. Button 3</button>
<button onclick="copySmart(4)">4. Button 4</button>
<button onclick="copySmart(5)">5. Button 5</button>
<button onclick="copySmart(6)">6. Button 6</button>
<button onclick="copySmart(7)">7. Button 7</button>
<button onclick="copySmart(8)">8. Button 8</button>
<button onclick="copySmart(9)">9. Button 9</button>
<button onclick="copySmart(10)">10. Button 10</button>
</div>

</div>

<!-- TAB 2 -->
<div id="tab2" class="tabcontent">
<textarea id="content2" class="dark"></textarea>
<div class="grid">
<button onclick="copyProduct('🚀 Mũ Fullface Royal M266 giá tốt hôm nay #royalm266')">Royal M266</button>
<button onclick="copyProduct('Mũ lật hàm Royal M179 tiện lợi #royalm179')">Royal M179</button>
<button onclick="copyData('content2','#review #sanpham')">Review</button>
<button onclick="copyData('content2','#giamgia #uudai')">Giảm Giá</button>
<button onclick="copyData('content2','#tiktokshop')">TikTok Shop</button>
<button onclick="copyData('content2','#muasam')">Mua Sắm</button>
</div>
</div>

<!-- TAB MAIL -->
<div id="tab3" class="tabcontent">

<div class="mail-row">
<input value="https://mail.tm/" readonly>
<button onclick="window.open('https://mail.tm/')">Mở</button>
</div>

<div class="salary-box">
<h3>Tính Thu Nhập</h3>

<input type="number" id="income" placeholder="Thu nhập $">
<input type="number" id="rate" value="25000">

<select id="percent">
<option>50</option><option selected>100</option>
</select>

<button onclick="tinhTien()">Tính</button>
<textarea id="salaryResult" readonly></textarea>

</div>

</div>

<!-- TAB PAGE -->
<div id="tab4" class="tabcontent">
<div class="groupbox" id="pageList"></div>
</div>

<div id="notify"></div>
</div>

<script>

// TAB
function openTab(id,btn){
document.querySelectorAll(".tabcontent").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabbtn").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

// DATE
function today(){
const d=new Date();
return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
}

// MODE
function getMode(){
return document.querySelector('input[name="mode"]:checked').value;
}

// SPLIT TEXT
function splitText(){
let raw = document.getElementById("content1").value.trim();
let lines = raw.split("\n");
let result = [];

lines.forEach(line=>{
let match = line.match(/^\d+\.\s*(.*)/);
if(match){
result.push(match[1]);
}
});

return result;
}

// COPY SMART
function copySmart(index){
let mode = getMode();

if(mode === "single"){
let text=document.getElementById("content1").value;
navigator.clipboard.writeText(text+"\n\nNgày đăng: "+today());
notify("Đã copy full");
return;
}

let arr = splitText();

if(arr.length < index){
notify("Thiếu dòng "+index);
return;
}

let text = arr[index-1];

navigator.clipboard.writeText(text+"\n\nNgày đăng: "+today());
notify("Đã copy dòng "+index);
}

// BASIC
function copyData(id,tag){
let text=document.getElementById(id).value;
navigator.clipboard.writeText(text+"\n"+tag);
notify("Đã copy");
}

function copyProduct(t){
navigator.clipboard.writeText(t);
notify("Đã copy");
}

function pasteText(){
navigator.clipboard.readText().then(t=>{
document.getElementById("content1").value=t;
});
}

function clearText(){
document.getElementById("content1").value="";
}

// MONEY
function tinhTien(){
let income=parseFloat(document.getElementById("income").value)||0;
let rate=parseFloat(document.getElementById("rate").value)||0;
let percent=parseFloat(document.getElementById("percent").value)||0;

let receive=income*percent/100;
let vnd=receive*rate;

document.getElementById("salaryResult").value=
"Nhận: $"+receive+"\nVNĐ: "+vnd.toLocaleString();
}

// NOTIFY
function notify(msg){
document.getElementById("notify").innerText=msg;
setTimeout(()=>{document.getElementById("notify").innerText="";},2000);
}

</script>
</body>
</html>
